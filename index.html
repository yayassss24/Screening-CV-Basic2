    <script>
      // Early-running safety patch for window.fetch in iframe/sandboxed environments
      try {
        var originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function(newFetch) { originalFetch = newFetch; },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Safety patch for window.fetch skipped:", e);
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
